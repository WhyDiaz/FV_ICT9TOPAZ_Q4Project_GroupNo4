<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Q4 Student Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Michroma&display=swap" rel="stylesheet">
  <style>
    body {
      background-image: url('https://i.pinimg.com/originals/46/41/85/464185f5d6d3551ec72f925548f59388.png');
      background-repeat: no-repeat;
      background-size: cover;
      font-family: 'Michroma', sans-serif;
    }
    .page-wrapper {
      min-height: 90vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
    }
    .card {
      max-width: 700px;
      width: 100%;
      color: rgb(255, 255, 255);;
      background-color: rgb(20, 20, 20);

      background-image: url('https://cdn.pinchofattitude.com/wp-content/uploads/2023/08/Useful-Self-Love-Journal-Prompts-and-Exercises-1024x538.jpg'); 
      
    }
    .profile-preview {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #ffffff;
    }
    .largebreak {
      display: block;
      margin-top: 100px;
    }
  </style>
</head>
<body>
<br>
  <div class="page-wrapper">
    <div class="card shadow">
      <div class="card-body">
        <h1 class="text-center mb-3">Student Profile</h1>
        <h2 class="h5 text-center mb-4">OB DIGI LOGIN</h2>

        

        <div class="mb-3 text-center">
          <img id="profilePreview" src="https://via.placeholder.com/120" class="profile-preview mb-2 d-block mx-auto">
          <div>
            <label for="profilePic" class="form-label d-block">Profile</label>
            <input type="file" class="form-control d-block mx-auto" id="profilePic" accept="image/*">
          </div>
        </div>

        <form id="registrationForm">
          <div class="row">
            <div class="col-lg-6 mb-3">
              <label for="firstName" class="form-label">First Name</label>
              <input type="text" class="form-control" id="firstName" required placeholder="eg. John">
            </div>
            <div class="col-lg-6 mb-3">
              <label for="lastName" class="form-label">Last Name</label>
              <input type="text" class="form-control" id="lastName" required placeholder="eg. Smith">
            </div>
          </div>

          <div class="row">
            <div class="col-lg-4 mb-3">
              <label for="age" class="form-label">Age</label>
              <input type="number" class="form-control" id="age" min="1" required placeholder="Current body's age">
            </div>
            
            </div>
            <div class="col-lg-4 mb-3">
              <label for="email" class="form-label">Email</label>
              <input type="email" class="form-control" id="email" required placeholder="John@email.com">
            </div>
          </div>

          <div class="row">
            <div class="col-lg-7 mb-3">
              <label for="password" class="form-label">Password</label>
              <input type="password" class="form-center" id="password" required placeholder="eg. 12345">
            </div>
          </div>


          <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" value="" id="termsCheck" required>
            <label class="form-check-label" for="termsCheck">
              I agree to the <a href="https://docs.google.com/document/d/1godDPEqCta4nOEF54VMbWOIjGqerC6Ohttjb_jMpwZE/edit?usp=sharing">Terms and Conditions</a>.
            </label>
          </div>

          <div class="d-flex justify-content-end gap-2">
            <button type="button" id="cancelBtn" class="btn btn-secondary">Cancel</button>
            <button type="submit" id="createBtn" class="btn btn-primary">Create Account</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <p class="largebreak"></p>

  <script>

    const profileInput = document.getElementById("profilePic");
    const profilePreview = document.getElementById("profilePreview");

    profileInput.addEventListener("change", function () {
      if (profileInput.files && profileInput.files[0]) {
        const file = profileInput.files[0];
        const reader = new FileReader();

        reader.onload = function (e) {
          profilePreview.src = e.target.result;
        };

        reader.readAsDataURL(file);
        alert("Profile picture has been uploaded!");
      }
    });

      const form = document.getElementById("registrationForm");

    form.addEventListener("submit", function (event) {
    event.preventDefault();
    document.getElementById("registrationForm").reset();
    profilePreview.src = "https://via.placeholder.com/120";
    alert("Account has been created! Form will be reset.");
     });

    const cancelBtn = document.getElementById("cancelBtn");

    cancelBtn.addEventListener("click", function () {
      document.getElementById("registrationForm").reset();
      profilePreview.src = "https://via.placeholder.com/120";
      alert("Form has been cleared.");
    });
  </script>



  <footer class="footer fixed-bottom">
    <div class="container-fluid bg-secondary text-center mt-3 py-3 d-flex justify-content-center align-items-center">
        <div class="row m-0" style="font-size: medium;">
            <div class="col text-nowrap">
                <p></p>
            </div>
            <div class="col text-nowrap">
                <p></p>
            </div>
        </div>
    </div>
</footer>


</body>
</html>
