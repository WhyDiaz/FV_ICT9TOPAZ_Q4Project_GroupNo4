<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f7f6;
            padding-top: 50px;
        }
        .login-card {
            max-width: 400px;
            margin: auto;
            padding: 20px;
            border-radius: 10px;
            background-color: white;
            box-shadow: 0px 4px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="login-card">
        <h3 class="text-center mb-4">Student Login</h3>
        
        <div class="mb-3 text-center">
            <span class="badge bg-secondary" id="result1">Username</span>
            <span class="badge bg-secondary" id="result2">Password</span>
        </div>

        <div class="mb-3">
            <label class="form-label">User ID</label>
            <input type="text" class="form-control" id="num1" placeholder="Enter Username">
        </div>

        <div class="mb-3">
            <label class="form-label">Security Key</label>
            <input type="password" class="form-control" id="num2" placeholder="Enter Password">
        </div>

        <div class="d-grid gap-2">
            <button type="button" class="btn btn-primary" onclick="verify()">Login</button>
            <button type="button" class="btn btn-outline-danger" onclick="cancel()">Cancel</button>
        </div>
    </div>
</div>

<script>
    function verify() {
        var user = document.getElementById("num1").value;
        var pass = document.getElementById("num2").value;

        //update logic
        document.getElementById("result1").innerHTML = user;
        document.getElementById("result2").innerHTML = pass;

        if(user == "admin" && pass == "1234") {
            alert("Access Granted!");
        } else {
            alert("Invalid Credentials");
        }
    }

    function cancel() {
        document.getElementById("num1").value = "";
        document.getElementById("num2").value = "";
        document.getElementById("result1").innerHTML = "Username";
        document.getElementById("result2").innerHTML = "Password";
    }
</script>

</body>
</html>
