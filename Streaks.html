<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streaks Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>

        body { background-color: #f8f9fa; font-family: sans-serif; color: #333; }

        .side-bar {
            width: 240px; height: 100vh; background: white;
            border-right: 1px solid #ddd; position: fixed; 
            left: 0; top: 0; padding: 20px;
            display: flex; flex-direction: column; justify-content: space-between;
            z-index: 100;
        }
        
        .menu-item {
            padding: 12px; margin-bottom: 5px; border-radius: 8px;
            text-decoration: none; color: #666; display: block; font-weight: 500;
        }
        .menu-item.active { background: #1a1a1a; color: white; }


        .profile-footer { border-top: 1px solid #eee; padding-top: 20px; }
        
        .profile-link { 
            text-decoration: none; 
            color: inherit; 
            display: flex; 
            align-items: center; 
            padding: 5px;
            border-radius: 8px;
            transition: background 0.2s;
        }
        .profile-link:hover { background-color: #f8f9fa; }

        .avatar { width: 38px; height: 38px; background: #1a1a1a; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-right: 10px; font-size: 14px; }

        .logout-link { 
            color: #6b7280; 
            text-decoration: none; 
            font-size: 14px; 
            display: flex; 
            align-items: center; 
            padding: 12px 5px; 
            font-weight: 500; 
            margin-top: 10px;
        }

        .main-content { margin-left: 240px; padding: 40px; min-height: 100vh; }

        .calendar-card { background: white; padding: 30px; border-radius: 16px; border: 1px solid #eee; margin-bottom: 20px; }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; text-align: center; }
        
        .day-name { font-weight: 600; color: #999; font-size: 14px; padding-bottom: 15px; }
        
        .date-box { 
            aspect-ratio: 1 / 1; border: 1px solid #f0f0f0; border-radius: 12px; 
            display: flex; flex-direction: column; align-items: flex-start; 
            padding: 10px; font-weight: 500; position: relative; overflow: hidden;
        }

        .date-box.today { background: #1a1a1a; color: white; border: none; }

        .event-span {
            background-color: #f2d7d7; color: #8b0000; font-size: 9px;
            padding: 2px 4px; border-radius: 4px; width: 100%;
            text-align: left; margin-top: 4px; line-height: 1;
        }
        .bg-report { background-color: #e0e4f5; color: #4a55a2; }
        

        .bg-deadline { background-color: #ff4d4f; }
        .bg-exam { background-color: #722ed1; }
        .bg-event { background-color: #4a55a2; }


      </style>
</head>
<body>
    
      <div class="side-bar">
    <h4 class="fw-bold mb-4">Student Portal</h4>
    <nav>
        <a href="DashBoard.html
        " class="menu-item">Dashboard</a>
        <a href="virtualnotebook.html" class="menu-item">Notebooks</a>
        <a href="Streaks.html" class="menu-item active">Streaks</a>
        <a href="Study Tools.html" class="menu-item">Study Tools</a>
        <a href="Calendar.html" class="menu-item">Calendar</a>
    </nav>
</div>

 <div class="profile-footer">

            <a href="Profile Page.html" class="profile-link">
                <div class="avatar">ED</div>
                <div>
                    <div class="fw-bold small">Eran Diaz</div>
                    <div class="text-muted" style="font-size: 10px;">eran.diaz@</div>
                </div>
            </a>
            

            <a href="index.html" class="logout">
                <span class="me-2">Log out now</span>
            </a>
        </div>
    </div>

</body>
</html>
